@if (updateAvailable()) {
	<div class="update-banner" role="status" aria-live="polite">
		<div class="update-banner__text">
			<span class="update-banner__title">Update available</span>
			<span class="update-banner__message">Tap to refresh and get the latest version.</span>
		</div>

		<button
			type="button"
			class="update-banner__action"
			[disabled]="updateInProgress()"
			(click)="refreshApp()"
		>
			{{ updateInProgress() ? 'Refreshing...' : 'Refresh' }}
		</button>
	</div>
}

@if (canRequestNotificationPermission()) {
	<div class="notification-banner" role="status" aria-live="polite">
		<div class="notification-banner__text">
			<span class="notification-banner__title">Enable notifications</span>
			<span class="notification-banner__message">Get notified when someone adds a new quote.</span>
		</div>

		<button
			type="button"
			class="notification-banner__action"
			[disabled]="notificationSubscriptionInProgress()"
			(click)="enableNotifications()"
		>
			{{ notificationSubscriptionInProgress() ? 'Enabling...' : 'Enable' }}
		</button>
	</div>
}

<router-outlet />
