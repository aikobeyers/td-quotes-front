<div class="td-quotes-overview--wrapper">
    <div class="td-quotes-overview--header" [ngClass]="{ scrolled: hasScrolled() }">
        <div class="header--brand">
            <img src="icons/TD Icon sleek new.png" alt="TD" class="brand--logo" />
        </div>

        <div class="header--title">TD Quotes</div>

        <div class="header--actions">
            <button
                class="icon-button icon-button--test-push"
                type="button"
                [disabled]="isSendingTestPush()"
                (click)="sendTestPushNotification()"
                aria-label="Send test push notification"
                title="Temporary: send test push"
            >
                <mat-icon [fontIcon]="isSendingTestPush() ? 'hourglass_top' : 'notifications'" />
            </button>
            <button class="icon-button" type="button" (click)="openCreate()" aria-label="Create quote">
                <mat-icon fontIcon="add"></mat-icon>
            </button>
            <button class="icon-button" type="button" (click)="openFilters()" aria-label="Filter quotes">
                <mat-icon fontIcon="filter_alt"></mat-icon>
            </button>
    </div>
    </div>

    <div class="td-quotes-overview--container" #container (scroll)="onScroll($event)">
        <section class="overview--intro">
            <div class="overview--tabs">
                <button
                    type="button"
                    class="tab-pill"
                    [class.active]="activeTab() === 'all'"
                    (click)="setActiveTab('all')"
                >
                    All
                </button>
                <button
                    type="button"
                    class="tab-pill"
                    [class.active]="activeTab() === 'recent'"
                    (click)="setActiveTab('recent')"
                >
                    Recent
                </button>
                <button
                    type="button"
                    class="tab-pill"
                    [class.active]="activeTab() === 'favorites'"
                    (click)="setActiveTab('favorites')"
                >
                    Favorites
                </button>
            </div>
        </section>

        @if (isLoading()) {
            @for (i of [].constructor(8); track $index; let last = $last) {
                <div [ngStyle]="{ 'margin-bottom.px': last ? 0 : 10 }">
                    <td-quote-card class="td-quotes-overview--card" [isSkeleton]="true" />
                </div>
            }
        } @else {
            @for (tdQuote of displayedQuotes(); track tdQuote._id; let last = $last) {
                <div [ngStyle]="{ 'margin-bottom.px': last ? 0 : 10 }">
                    <td-quote-card
                        class="td-quotes-overview--card"
                        [tdQuote]="tdQuote"
                        [isFavorite]="isFavorite(tdQuote._id)"
                        (favoriteToggled)="toggleFavorite($event)"
                    />
                </div>
            }
        }

        <div class="overview--extras">
            <button class="text-action" type="button" (click)="openGame()">Play Quote Game</button>
            <button class="text-action" type="button" (click)="openLeaderboard()">View Leaderboard</button>
        </div>
    </div>
</div>
<app-td-quote-filters #filters (closeFiltersEmitter)="getQuotes($event)"></app-td-quote-filters>
<app-td-quote-create #create (closeCreateEmitter)="getQuotes($event)"
    (createQuoteEmitter)="createQuote($event)"></app-td-quote-create>
<app-td-quote-game #game></app-td-quote-game>
<app-td-quotes-leaderboard #leaderboard></app-td-quotes-leaderboard>
